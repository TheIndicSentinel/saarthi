name: Build Saarthi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install NDK 27 and CMake 3.22
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" 2>/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}" >> local.properties

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/saarthi-release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/saarthi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-configuration-cache 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Build failure summary (last 150 lines)"
            tail -150 /tmp/build.log
            echo "::endgroup::"
            ERROR_LINES=$(grep -E "^e:|error:|FAILED|Exception|KSP|Unresolved|> Could not|C/C\+\+" /tmp/build.log | tail -30)
            echo "::error::Build failed. Key errors:%0A${ERROR_LINES}"
          fi
          exit $EXIT_CODE

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: saarthi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
