name: Build Saarthi APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install NDK 27 and CMake 3.22
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" 2>/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      - name: Patch NDK sysroot with Vulkan C++ headers
        run: |
          # ggml-vulkan.cpp needs vulkan/vulkan.hpp and spirv/unified1/spirv.hpp.
          # The NDK sysroot only ships the C API (vulkan.h).  clang++ is invoked
          # with --sysroot so the sysroot /usr/include is already on the search
          # path — no CMake changes needed, just copy the missing C++ headers in.
          NDK_INC="$ANDROID_HOME/ndk/27.0.12077973/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include"
          sudo apt-get install -y --no-install-recommends libvulkan-dev spirv-headers
          # Vulkan C++ bindings (vulkan.hpp, vulkan_core.hpp, etc.)
          cp /usr/include/vulkan/*.hpp "$NDK_INC/vulkan/"
          # SPIRV-Headers (spirv/unified1/spirv.hpp etc.)
          cp -r /usr/include/spirv "$NDK_INC/"
          echo "vulkan.hpp: $(ls $NDK_INC/vulkan/vulkan.hpp)"
          echo "spirv.hpp:  $(ls $NDK_INC/spirv/unified1/spirv.hpp)"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/27.0.12077973" >> local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}" >> local.properties

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/saarthi-release.jks

      - name: Patch ggml — remove SVE2/SME Android variants
        # Belt-and-suspenders alongside the CMake-level patch.
        # Removes android_armv9 GGML backend variants before CMake configure runs
        # so they are never compiled into the APK.  These variants crash on
        # Snapdragon 8 Gen 2 / Android 16 due to heterogeneous SVE2 core widths.
        run: |
          python3 - << 'PYEOF'
          import re, sys
          path = 'core/core-inference/src/main/cpp/llama.cpp/ggml/src/CMakeLists.txt'
          with open(path, 'r') as f:
              content = f.read()
          patched = re.sub(r'[ \t]*ggml_add_cpu_backend_variant\(android_armv9[^\n]*\n', '', content)
          if 'android_armv9' in patched:
              print("ERROR: SVE patch failed — android_armv9 still present", file=sys.stderr)
              sys.exit(1)
          with open(path, 'w') as f:
              f.write(patched)
          removed = content.count('android_armv9') - patched.count('android_armv9')
          print(f"SVE patch OK: removed {removed} android_armv9 variant(s)")
          PYEOF

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/saarthi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-configuration-cache 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Build failure summary (last 150 lines)"
            tail -150 /tmp/build.log
            echo "::endgroup::"
            ERROR_LINES=$(grep -E "^e:|error:|FAILED|Exception|KSP|Unresolved|> Could not|C/C\+\+" /tmp/build.log | tail -30)
            echo "::error::Build failed. Key errors:%0A${ERROR_LINES}"
          fi
          exit $EXIT_CODE

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: saarthi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
