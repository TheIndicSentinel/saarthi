name: Build Saarthi APK

# Builds an installable DEBUG APK for on-device testing on every push to main.
#
# Why debug (not release) here:
#  • The release R8/minify step is memory-hungry — with the litertlm native
#    libs + ML Kit + PdfBox it OOM-kills the 2-core runner mid-`minifyRelease`
#    (exit 143), and it's the ~16-min long pole. A debug build skips R8 entirely
#    → ~3–4 min, no OOM, rock-solid.
#  • A debug APK is exactly what you want for TESTING: installable via adb, and
#    it writes the public Downloads/saarthi_debug.log (PUBLIC_DEBUG_LOG) so you
#    can read TTFT / backend / decodeTps off the device.
#  • The SIGNED release .aab for the Play Store is built separately by
#    release_aab.yml, triggered on a version tag (v*). Store builds don't run on
#    every push — only when you cut a release.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Cancel an in-flight run when a newer commit is pushed — avoids two builds
# racing for runners and the confusing "which run failed" situation.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write   # publish the APK as a Release asset (raw download)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME"                       > local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}"   >> local.properties

      # testDebugUnitTest only — `test` also builds+runs the RELEASE unit-test
      # variant (a second full compile of all 8 modules) for zero extra
      # coverage: our tests are variant-agnostic.
      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest 2>&1 | tee /tmp/test.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Test failure summary (last 80 lines)"
            tail -80 /tmp/test.log
            echo "::endgroup::"
          fi
          exit $EXIT_CODE

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: test-report
          path: "**/build/reports/tests/"
          retention-days: 2

      # Debug APK — no R8, no keystore, no OOM. The artifact you install to test.
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug -Psaarthi.publicLog=true --stacktrace 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Build failure summary (last 150 lines)"
            tail -150 /tmp/build.log
            echo "::endgroup::"
            ERROR_LINES=$(grep -E "^e:|error:|FAILED|Exception|KSP|Unresolved|> Could not" /tmp/build.log | tail -30)
            echo "::error::Build failed. Key errors:%0A${ERROR_LINES}"
          fi
          exit $EXIT_CODE

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: saarthi-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 2

      # ── Direct-download release (no unzip needed) ───────────────────────
      # Publishes to a single rolling "latest" pre-release so the newest build
      # is always at <repo>/releases/latest as raw Saarthi.apk — open it in the
      # phone browser to install, or `adb install` it.
      - name: Publish APK to rolling "latest" release (raw download)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk Saarthi.apk
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest Saarthi build (debug/testable)" \
            --notes "Auto-built from ${{ github.sha }}. Download **Saarthi.apk** and install it on your phone (adb install, or open in the phone browser). Debug build — writes Downloads/saarthi_debug.log for TTFT/perf inspection." \
            --prerelease \
            Saarthi.apk
