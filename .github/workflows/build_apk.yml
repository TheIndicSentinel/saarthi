name: Build Saarthi APK

# Builds and signs the release APK. The native llama.cpp bridge was
# removed in v1.0.19 — no NDK / CMake / Vulkan / SVE-patch steps any
# more, so this workflow is now ~3 minutes instead of ~12.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Needed so the build can publish APKs as Release assets (raw, directly
    # installable downloads — no artifact .zip wrapper to unpack on a phone).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME"                       > local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}"   >> local.properties

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew test 2>&1 | tee /tmp/test.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Test failure summary (last 80 lines)"
            tail -80 /tmp/test.log
            echo "::endgroup::"
          fi
          exit $EXIT_CODE

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: "**/build/reports/tests/"
          retention-days: 7

      # Android Lint — informational, NON-blocking. Surfaces correctness /
      # security / a11y / performance issues without failing the release
      # pipeline on pre-existing findings. Review the uploaded HTML report and
      # tighten over time; flip continue-on-error to false once it is clean.
      - name: Run Android Lint (non-blocking)
        continue-on-error: true
        run: ./gradlew :app:lintRelease

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/saarthi-release.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/saarthi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Build failure summary (last 150 lines)"
            tail -150 /tmp/build.log
            echo "::endgroup::"
            ERROR_LINES=$(grep -E "^e:|error:|FAILED|Exception|KSP|Unresolved|> Could not" /tmp/build.log | tail -30)
            echo "::error::Build failed. Key errors:%0A${ERROR_LINES}"
          fi
          exit $EXIT_CODE

      # Build log only when something fails — keeps artifact storage small.
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      # Short retention so APKs don't pile up and exhaust the account's
      # Actions storage quota (which silently blocks NEW runs from being
      # created on push — the symptom that prompted this change). Download
      # the APK soon after the build; older ones auto-expire.
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: saarthi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      # ── Direct-download release (no unzip needed) ───────────────────────
      # GitHub *artifacts* are always wrapped in a .zip, which is awkward to
      # unpack on a phone. Publishing as a Release *asset* gives a raw APK
      # URL you can open directly in a browser on your phone and install.
      # Published to a single rolling "latest" pre-release so the newest build
      # is always at <repo>/releases/latest — old assets are replaced each run.
      - name: Publish APK to rolling "latest" release (raw download)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk Saarthi.apk
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest Saarthi build" \
            --notes "Auto-built from ${{ github.sha }}. Download **Saarthi.apk** and open it on your phone to install." \
            --prerelease \
            Saarthi.apk
