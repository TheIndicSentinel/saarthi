name: CI

# Fast PR-gating workflow.
# Runs on every push to main and every pull request, so a broken build
# can't reach main without a status-check failure.
#
# Two parallel jobs so failure modes are reported separately:
#   • unit-tests — pure-JVM tests across all library modules.
#   • assemble-debug — full Android debug build (Kotlin only since the
#     llama.cpp native bridge was removed in v1.0.19; no NDK / Vulkan
#     setup is needed any more).
#
# The signed-release builder (build_apk.yml) ships the binary; this
# workflow ships confidence.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Unit tests — fast, no NDK. Every Android library module gets a
  # working test classpath via the AndroidLibraryConventionPlugin
  # (junit + mockk + coroutines-test + turbine), so testDebugUnitTest
  # covers the whole repo in a single command.
  # ──────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Branches other than main use the cache read-only so a failing
          # PR can never poison the warm cache main builds rely on.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests (all modules)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Test summary
        if: always()
        run: |
          {
            echo "## Unit-test results"
            echo ""
            echo "| Module | Tests | Failures | Errors |"
            echo "|--------|-------|----------|--------|"
            shopt -s globstar nullglob
            for f in **/build/test-results/testDebugUnitTest/TEST-*.xml; do
              tests=$(sed -nE 's/.*tests="([0-9]+)".*/\1/p' "$f" | head -1)
              fail=$(sed -nE 's/.*failures="([0-9]+)".*/\1/p' "$f"   | head -1)
              err=$(sed -nE  's/.*errors="([0-9]+)".*/\1/p' "$f"     | head -1)
              cls=$(sed -nE  's/.*<testsuite name="([^"]+)".*/\1/p' "$f" | head -1)
              echo "| \`${cls}\` | ${tests:-?} | ${fail:-?} | ${err:-?} |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────
  # Debug-APK build — proves a regression in KSP / Hilt / Compose / R8
  # can't reach main without a red status. Fast now that the native
  # build is gone (no NDK / CMake / Vulkan-headers setup needed).
  # ──────────────────────────────────────────────────────────────────────
  assemble-debug:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn
