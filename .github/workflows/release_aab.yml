name: Release AAB (Play Store)

# Builds the SIGNED Android App Bundle (.aab) that Google Play requires for new
# apps (Play does not accept APKs for new apps). Triggered by pushing a version
# tag like `v1.0.30`, or run manually from the Actions tab.
#
# ── One-time setup (GitHub → Settings → Secrets and variables → Actions) ──────
#   KEYSTORE_BASE64     base64 of your UPLOAD keystore .jks  (`base64 -i key.jks | pbcopy`)
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias
#   KEY_PASSWORD        key password
#   HF_APP_TOKEN        HuggingFace token used at build time (same as build_apk.yml)
#   PLAY_SERVICE_ACCOUNT_JSON   (OPTIONAL, for auto-publish) — a Google Play
#       service-account JSON with "Release manager" access. Needed only if you
#       uncomment the "Upload to Google Play" step below.
#
# ── How to cut a release ──────────────────────────────────────────────────────
#   1. Bump versionCode + versionName in app/build.gradle.kts.
#   2. git tag v1.0.30 && git push origin v1.0.30
#   3. This workflow builds the signed .aab and attaches it as an artifact
#      (and, if enabled, uploads it to the Play "internal" track).
#   4. Download the .aab from the run and upload it in Play Console, OR enable
#      the auto-publish step for a fully hands-off store update.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    # bundleRelease runs R8 (~16 min here) after tests — 30 min was too tight
    # once PdfBox joined the dependency set. Match build_apk.yml's 45.
    timeout-minutes: 45
    permissions:
      contents: write   # so the .aab can be attached to a GitHub Release too
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME"                     > local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}" >> local.properties

      # Tests gate the release — never ship a red build to the store.
      # testDebugUnitTest only: the release unit-test variant is a redundant
      # full recompile for identical (variant-agnostic) tests.
      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --stacktrace

      - name: Decode upload keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/saarthi-release.jks

      - name: Build signed release AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore/saarthi-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --stacktrace 2>&1 | tee /tmp/bundle.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Bundle failure (last 150 lines)"; tail -150 /tmp/bundle.log; echo "::endgroup::"
            echo "::error::bundleRelease failed."
          fi
          exit $EXIT_CODE

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        # A full artifact-storage quota must never fail the release build itself
        # (the .aab is on disk in the run regardless). Clear storage in
        # repo → Actions → Storage if uploads start failing.
        continue-on-error: true
        with:
          name: saarthi-release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 7

      # ── OPTIONAL: hands-off store publish ────────────────────────────────────
      # Uncomment once PLAY_SERVICE_ACCOUNT_JSON is set. Publishes to the
      # "internal" track as a draft so you still review before production.
      # - name: Upload to Google Play (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.saarthi.app
      #     releaseFiles: app/build/outputs/bundle/release/*.aab
      #     track: internal
      #     status: draft
