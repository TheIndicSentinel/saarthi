name: Build Release APK (test)

# On-demand SIGNED-or-debug-signed, R8-minified RELEASE .apk for on-device
# testing (smaller + minified, closer to the store build than the debug apk).
#
# Manual only (Run workflow button) — the release build runs R8 (~16 min) and
# is memory-heavy, so it must NOT run on every push (that OOM-killed the runner
# with exit 143). The everyday push build stays fast/debug in build_apk.yml; the
# store .aab is built by release_aab.yml on a version tag.
#
# The OOM fix: force --no-parallel --max-workers=2 so R8 doesn't run alongside
# several other full-heap worker JVMs — the committed gradle.properties uses
# parallel=true + -Xmx6g, which on a 2-core 16 GB runner stacked enough JVMs to
# exceed RAM. Serial keeps the peak well under the limit.

on:
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME"                       > local.properties
          echo "hf.app.token=${{ secrets.HF_APP_TOKEN }}"   >> local.properties

      # Optional signing: if the upload-keystore secrets are set, sign with the
      # real key; otherwise app/build.gradle.kts falls back to debug signing,
      # which is still installable for testing.
      - name: Decode keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore/saarthi-release.jks
            echo "HAVE_KEYSTORE=1" >> "$GITHUB_ENV"
          else
            echo "No keystore secret set — building debug-signed release (fine for testing)."
          fi

      - name: Build Release APK (serial, low memory pressure)
        env:
          KEYSTORE_PATH: ${{ env.HAVE_KEYSTORE && format('{0}/keystore/saarthi-release.jks', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -Psaarthi.publicLog=false --no-parallel --max-workers=2 --stacktrace 2>&1 | tee /tmp/build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::group::Build failure summary (last 150 lines)"; tail -150 /tmp/build.log; echo "::endgroup::"
          fi
          exit $EXIT_CODE

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: release-build-log
          path: /tmp/build.log
          retention-days: 2

      # Downloadable Actions artifact — appears in the run's "Artifacts" section
      # (same as the debug build), in addition to the Releases-page publish below.
      - name: Upload release APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: saarthi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 5

      - name: Publish release APK to rolling "latest-release"
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk Saarthi-release.apk
          gh release delete latest-release --yes --cleanup-tag 2>/dev/null || true
          gh release create latest-release \
            --title "Latest Saarthi RELEASE build (test)" \
            --notes "R8-minified release build from ${{ github.sha }}. Download **Saarthi-release.apk** and install it (adb install, or open in the phone browser)." \
            --prerelease \
            Saarthi-release.apk
